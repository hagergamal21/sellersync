{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register</title>
    <link rel="stylesheet" href="{% static 'css/styles.css' %}">
    <link rel="stylesheet" href="{% static 'cl-icon/css/all.min.css' %}">
</head>
<body>
    <div class="wrapper">
        <div class="form-container">
            <form action="{% url 'register' %}" method="POST" class="form">
                {% csrf_token %}
                <h1 class="title">Register</h1>
                {% if messages %}
                    <div class="messages">
                        {% for message in messages %}
                            <p>{{ message }}</p>
                        {% endfor %}
                    </div>
                {% endif %}
                <div class="inp">
                    <input type="text" name="username" class="input" placeholder="Username" required>
                    <i class="fa-solid fa-user"></i>
                </div>
                <div class="inp">
                    <input type="email" name="email" class="input" placeholder="Email" required>
                    <i class="fa-solid fa-envelope"></i>
                </div>
                <div class="inp">
                    <input type="password" name="password1" class="input" placeholder="Password" required>
                    <validation_result= validate_password(password) print(validation_result)></validation_result>
                    <i class="fa-solid fa-lock"></i>
                </div>
                <div class="inp">
                    <input type="password" name="password2" class="input" placeholder="Confirm Password" required>
                    <i class="fa-solid fa-lock"></i>
                </div>
                <button type="submit" class="submit">Sign Up</button>
                <p class="footer">Already have an account? <a href="{% url 'login' %}" class="link">Log in</a></p>
                <br>
                <p class="footer">Back to HOME? <a href="{% url 'home' %}" class="link">HOME</a></p>
            </form>
        </div>
        <div class="banner">
            <h1 class="wel_text">Welcome</h1>
        </div>
    </div>
</body>
</html>
