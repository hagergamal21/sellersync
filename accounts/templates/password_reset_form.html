<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password</title>
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #0b0f19;
            font-family: Arial, sans-serif;
        }
        .container {
            background: linear-gradient(to right, #00d2ff, #3a47d5);
            padding: 40px;
            border-radius: 10px;
            box-shadow: 0px 0px 20px rgba(0, 210, 255, 0.6);
            text-align: center;
            width: 400px;
            color: white;
        }
        h3 {
            margin-bottom: 15px;
            font-size: 22px;
        }
        p {
            font-size: 14px;
            margin-bottom: 20px;
        }
        form {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        input[type="password"] {
            width: 100%;
            padding: 10px;
            border: none;
            border-radius: 5px;
            font-size: 14px;
        }
        .btn {
            display: inline-block;
            width: 100%;
            padding: 10px;
            background: linear-gradient(to right, #00d2ff, #3a47d5);
            border: none;
            border-radius: 5px;
            color: white;
            font-size: 16px;
            cursor: pointer;
            transition: 0.3s ease-in-out;
        }
        .btn:hover {
            background: linear-gradient(to right, #3a47d5, #00d2ff);
        }
    </style>
</head>
<body>

    <div class="container">
        <h3>Enter New Password</h3>
        <p>Please enter your new password twice so we can verify it.</p>

        <form method="post">
            {% csrf_token %}
            {{ form.as_p }}
            <button type="submit" class="btn">Update Password</button>
        </form>
    </div>

</body>
</html>
