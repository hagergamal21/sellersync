<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Password Reset Complete</title>
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #0b0f19;
            font-family: Arial, sans-serif;
        }
        .container {
            background: linear-gradient(to right, #00d2ff, #3a47d5);
            padding: 40px;
            border-radius: 10px;
            box-shadow: 0px 0px 20px rgba(0, 210, 255, 0.6);
            text-align: center;
            width: 400px;
            color: white;
        }
        h3 {
            margin-bottom: 15px;
            font-size: 22px;
        }
        p {
            font-size: 14px;
            margin-bottom: 20px;
        }
        .btn {
            display: inline-block;
            width: 100%;
            padding: 10px;
            background: linear-gradient(to right, #00d2ff, #3a47d5);
            border: none;
            border-radius: 5px;
            color: white;
            font-size: 16px;
            text-decoration: none;
            text-align: center;
            cursor: pointer;
            transition: 0.3s ease-in-out;
        }
        .btn:hover {
            background: linear-gradient(to right, #3a47d5, #00d2ff);
        }
    </style>
</head>
<body>

    <div class="container">
        <h3>Password Reset Complete</h3>
        <p>Your password has been set successfully. You can now log in.</p>

        <a href="{% url 'login' %}" class="btn">Log in</a>
    </div>

</body>
</html>
