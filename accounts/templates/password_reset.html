<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Password Reset</title>
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #0b0f19;
            font-family: Arial, sans-serif;
        }
        .container {
            background: linear-gradient(to right, #00d2ff, #3a47d5);
            padding: 40px;
            border-radius: 10px;
            box-shadow: 0px 0px 20px rgba(0, 210, 255, 0.6);
            text-align: center;
            width: 350px;
            color: white;
        }
        h3 {
            margin-bottom: 10px;
        }
        p {
            font-size: 14px;
            margin-bottom: 20px;
        }
        input[type="email"] {
            width: 100%;
            padding: 10px;
            margin: 10px 0;
            border-radius: 5px;
            border: none;
            outline: none;
        }
        button {
            width: 100%;
            padding: 10px;
            background: linear-gradient(to right, #00d2ff, #3a47d5);
            border: none;
            border-radius: 5px;
            color: white;
            font-size: 16px;
            cursor: pointer;
            transition: 0.3s ease-in-out;
        }
        button:hover {
            background: linear-gradient(to right, #3a47d5, #00d2ff);
        }
    </style>
</head>
<body>

    <div class="container">
        <h3>Password Reset</h3>
        <p>Forgotten your password? Enter your email below and we'll send instructions to reset it.</p>
        
        <form method="post">
            {% csrf_token %}
            <input type="email" name="email" placeholder="Enter your email" required>
            <button type="submit">Send Reset Link</button>
        </form>
    </div>

</body>
</html>
