<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Submit Price Suggestion</title>
    <link rel="stylesheet" href="/static/css/price_suggestion.css">
</head>
<body>
    <header class="top-header">
        <div class="logo">SellerSync</div>
        <nav>
            <ul>
                <li class="active"><a href="/price-suggestion/form/">Price Suggestion</a></li>
                <br>
                <li><a href="/price-suggestion/history/">Sales History</a></li>
                <br>
                <li><a href="#">Analytics</a></li>
                <br>
                <li><a href="#">Settings</a></li>
            </ul>
        </nav>
    </header>

    <div class="container">
        <div class="header-bar">
            <h1>🛒 Submit Price Suggestion</h1>
            <button class="download-btn" onclick="downloadReport()">Download Report</button>
        </div>
        <br>
        <div class="form-container">
            <form method="post">
                {% csrf_token %}
                <div class="form-group">
                    <label for="sub_category">Sub-Category:</label>
                    <select id="sub_category" name="sub_category" required>
                        <option value="">Select a category</option>
                        <option value="Accessories">Accessories</option>
                        <option value="Bags">Bags</option>
                        <option value="Dresses">Dresses</option>
                        <option value="Jeans">Jeans</option>
                        <option value="Shoes">Shoes</option>
                        <option value="Tops">Tops</option>
                    </select>
                </div>
                <br>
                <div class="form-group">
                    <label for="price">Price ($):</label>
                    <input type="number" step="0.01" id="price" name="price" required>
                </div>
                <br>
                <button type="submit" class="submit-btn">Suggest Price</button>
            </form>
            <br>
            <div class="view-history">
                <a href="/price-suggestion/history/">📜 View Prediction History</a>
            </div>
        </div>
    </div>

    <script src="/static/js/price_suggestion.js"></script>
</body>
</html>
